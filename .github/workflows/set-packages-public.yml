# Run after first publish or to fix visibility on existing org NuGet packages.
name: Set packages public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - name: List and set org NuGet packages public
        env:
          ORG: Novolis-Platform
        run: |
          set -euo pipefail
          page=1
          while true; do
            resp=$(curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/${ORG}/packages?package_type=nuget&per_page=100&page=${page}")
            count=$(echo "$resp" | jq 'length')
            [ "$count" -eq 0 ] && break
            echo "$resp" | jq -c '.[] | {name, visibility}'
            echo "$resp" | jq -r '.[].name' | while read -r name; do
              code=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X PATCH \
                -H "Authorization: Bearer ${{ github.token }}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                "https://api.github.com/orgs/${ORG}/packages/nuget/${name}/visibility" \
                -d '{"visibility":"public"}')
              echo "PATCH ${name} -> HTTP ${code} $(cat /tmp/out.json)"
            done
            [ "$count" -lt 100 ] && break
            page=$((page + 1))
          done
